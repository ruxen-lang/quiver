[package]
name = "quiver"
version = "0.1.0"
edition = "2026"
description = "L2 framework for the Ruxen GUI stack: fine-grained reactive signals, a Ruby-block DSL, layout, and widgets — 100% safe, platform-agnostic Ruxen."

[build]
type = "library"

[dependencies]
# quiver now OWNS the desktop shell (src/desktop.rx: SkiaPaint + run_app + event
# loop) so apps write only components + DSL. That requires quiver to see canvas
# (L1) symbols. Safe in ruxen v1: a LIBRARY build archives an rlib with no link
# step (undefined ruxen_canvas_* defer to the consuming binary), and a BINARY
# flat-merges the full transitive closure + compiles canvas's runtime/*.c +
# forwards its [system_libs] (canvas's are empty — SDL2/Skia are dlopen'd). The
# old Q16 "deps don't merge for library/test" issue is fixed (Q32). See memory
# ruxen-deps-transitive-linking + quiver/docs/ROADMAP.md Milestone 2.
canvas = { path = "../canvas" }

# Historical note: quiver was previously canvas-free "by charter" (platform
# agnostic, pick-your-backend). Reversed 2026-06-14 — there is only one backend
# (canvas drives desktop Skia/SDL AND web CanvasKit via the same ruxen_canvas_*
# ABI), so the abstraction bought nothing and cost the user a hand-written shell.
