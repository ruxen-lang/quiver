[package]
name = "quiver"
version = "0.1.0"
edition = "2026"
description = "L2 framework for the Ruxen GUI stack: fine-grained reactive signals, a Ruby-block DSL, layout, and widgets — 100% safe, platform-agnostic Ruxen."

[build]
type = "library"

[dependencies]
# L2 depends on the L1 engine for windowing, input, and the 2D canvas.
# Published git dependency so anyone depending on quiver pulls canvas
# transitively — no need to vendor or path-link L1 by hand.
canvas = { git = "https://github.com/ruxen-lang/canvas.git", branch = "master" }
