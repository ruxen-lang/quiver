[package]
name = "quiver"
version = "0.1.0"
edition = "2026"
description = "L2 framework for the Ruxen GUI stack: fine-grained reactive signals, a Ruby-block DSL, layout, and widgets — 100% safe, platform-agnostic Ruxen."

[build]
type = "library"

[dependencies]
# L2 depends on the L1 engine for windowing, input, and the 2D canvas.
# Local path dependency while both packages are developed side-by-side under
# ~/Documents; switch to a version/git dependency once published.
canvas = { path = "../canvas" }
