[package]
name = "quiver"
version = "0.1.0"
edition = "2026"
description = "L2 framework for the Ruxen GUI stack: fine-grained reactive signals, a Ruby-block DSL, layout, and widgets — 100% safe, platform-agnostic Ruxen."

[build]
type = "library"

# No [dependencies] on canvas — and that is deliberate.
#
# quiver (L2) is platform-AGNOSTIC: its src/ and tests/ contain zero canvas
# (L1) symbols (paint crosses the boundary as plain Ints/Strings only). An app
# chooses its rendering engine and declares BOTH quiver and an engine (canvas)
# itself — see examples/*/Ruxen.toml. This is what lets quiver target any
# backend, not just canvas.
#
# A hard canvas dependency here also BREAKS `ruxen test`: ruxen v1 flat-merges a
# dependency's full src into the consumer's build (Q16), so canvas's FFI-calling
# method bodies would be pulled into quiver's test EXECUTABLE without canvas's
# C runtime/system_libs linked → undefined `ruxen_canvas_*` at link. (Tracked as
# a ruxen Q-candidate: flat-merge of an FFI dependency into a test/binary build
# should be demand-driven or link the dep's C runtime.)
