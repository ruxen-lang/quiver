[package]
name = "counter"
version = "0.1.0"
edition = "2026"
description = "The quiver milestone-1 demo: tap a button, the number increments, only the count node repaints."

[build]
type = "binary"

[dependencies]
# Binary packages flat-merge dependency sources in ruxen v1, so this app can
# see both quiver (L2) and canvas (L1) symbols.
quiver = { path = "../.." }
canvas = { path = "../../../canvas" }
